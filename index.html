<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微型宇宙 · Tiny Cosmos</title>
  <link rel="stylesheet" href="css/game.css?v=2">
</head>
<body>

  <!-- ═══ Header ═══ -->
  <header class="header">
    <h1 class="title">微型宇宙 <span class="title-en">Tiny Cosmos</span></h1>
    <div class="header-actions">
      <button id="save-btn" class="btn btn-ghost">💾</button>
      <button id="reset-btn" class="btn btn-ghost">🔄</button>
    </div>
  </header>

  <!-- ═══ Canvas — Visual Center ═══ -->
  <div id="cosmos-stage" class="cosmos-stage">
    <canvas id="cosmos-canvas"></canvas>
    <div id="click-hint" class="click-hint">👆 点击产生夸克</div>
  </div>

  <!-- ═══ Focus Stats ═══ -->
  <div class="focus-bar">
    <div id="focus-quarks" class="focus-stat">
      <span class="focus-value" id="focus-q-count">0</span>
      <span class="focus-label">夸克</span>
      <span class="focus-rate" id="focus-q-rate">+0.3/s</span>
    </div>
    <div id="focus-rp" class="focus-stat focus-stat-rp">
      <span class="focus-label">🔬 研究</span>
      <span class="focus-value" id="focus-rp-count">0</span>
      <span class="focus-rate"><span id="focus-rp-target">/50</span> RP</span>
    </div>
  </div>

  <!-- ═══ Tier Overview ═══ -->
  <div id="tier-overview" class="tier-overview">
    <!-- dynamically rendered -->
  </div>

  <!-- ═══ Action Buttons ═══ -->
  <div id="action-bar" class="action-bar">
    <!-- dynamically rendered -->
  </div>

  <!-- ═══ Evolution Line ═══ -->
  <div class="evolution-section">
    <div class="evolution-label">宇宙演化</div>
    <div id="evolution-line" class="evolution-line">
      <!-- dynamically rendered -->
    </div>
  </div>

  <!-- ═══ Prestige Panel ═══ -->
  <div id="prestige-panel" class="prestige-panel" style="display:none">
    <div class="prestige-trigger">
      <button id="prestige-btn" class="btn btn-prestige">🌌 大坍缩 · Big Crunch</button>
      <span class="prestige-gain" id="prestige-gain-text">获得 0 恒定点</span>
    </div>
    <div class="prestige-detail" id="prestige-detail" style="display:none">
      <div class="constant-row">
        <span class="constant-label">💪 强核力 <span id="sf-level">0</span></span>
        <input type="range" id="constant-strong" min="0" value="0" class="constant-slider">
        <span class="constant-effect">成本 ÷<span id="sf-effect">1.00</span></span>
      </div>
      <div class="constant-row">
        <span class="constant-label">⚡ 光速 <span id="ls-level">0</span></span>
        <input type="range" id="constant-light" min="0" value="0" class="constant-slider">
        <span class="constant-effect">速度 ×<span id="ls-effect">1.00</span></span>
      </div>
      <div class="constant-row">
        <span class="constant-label">🌍 引力 <span id="gv-level">0</span></span>
        <input type="range" id="constant-gravity" min="0" value="0" class="constant-slider">
        <span class="constant-effect">底层 ×<span id="gv-effect">1.00</span></span>
      </div>
      <div class="cp-info">
        恒定点: <span id="cp-total">0</span> | 已分配: <span id="cp-used">0</span> | 未分配: <span id="cp-free">0</span>
      </div>
    </div>
  </div>

  <!-- ═══ Milestones ═══ -->
  <div id="milestones-bar" class="milestones-bar" style="display:none"></div>

  <!-- ═══ Scripts ═══ -->
  <script src="js/constants.js?v=3"></script>
  <script src="js/state.js?v=3"></script>
  <script src="js/engine.js?v=3"></script>
  <script src="js/render.js?v=3"></script>
  <script src="js/ui.js?v=3"></script>
  <script src="js/main.js?v=3"></script>
</body>
</html>
