<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微型宇宙 · Tiny Cosmos</title>
  <link rel="stylesheet" href="css/game.css?v=4">
</head>
<body>

  <header class="header">
    <h1 class="title">微型宇宙 <span class="title-en">Tiny Cosmos</span></h1>
    <div class="header-actions">
      <button id="save-btn" class="btn btn-ghost">💾</button>
      <button id="reset-btn" class="btn btn-ghost">🔄</button>
    </div>
  </header>

  <!-- Canvas -->
  <div id="cosmos-stage" class="cosmos-stage">
    <canvas id="cosmos-canvas"></canvas>
    <div id="click-hint" class="click-hint">👆 点击产生夸克</div>
  </div>

  <!-- Focus -->
  <div class="focus-bar">
    <div class="focus-stat">
      <span class="focus-value" id="f-quarks">0</span>
      <span class="focus-label">夸克</span>
      <span class="focus-rate" id="f-quarks-rate">+0.3/s</span>
    </div>
    <div class="focus-stat">
      <span class="focus-label">🔬 研究</span>
      <span class="focus-value" id="f-rp">0</span>
      <span class="focus-rate" id="f-rp-target">/50 RP</span>
    </div>
  </div>

  <!-- Actions — persistent buttons, NEVER destroyed -->
  <div class="action-bar">
    <button id="btn-producer-0" class="btn btn-primary" disabled>⚡ 自动观测</button>
    <button id="btn-synth" class="btn" disabled style="display:none">⬆ 合成</button>
    <button id="btn-producer-1" class="btn" disabled style="display:none">⚙ 生产</button>
    <button id="btn-research" class="btn btn-blue" disabled style="display:none">🔬 研究</button>
  </div>

  <!-- Evolution -->
  <div class="evolution-section">
    <div class="evolution-label">宇宙演化</div>
    <div id="evolution-line" class="evolution-line"></div>
  </div>

  <!-- Prestige -->
  <div id="prestige-panel" class="prestige-panel" style="display:none">
    <div class="prestige-trigger">
      <button id="prestige-btn" class="btn btn-prestige">🌌 大坍缩</button>
      <span class="prestige-gain" id="prestige-gain-text"></span>
    </div>
    <div id="prestige-detail" class="prestige-detail" style="display:none">
      <div class="constant-row">
        <span class="constant-label">💪 强核力 <span id="sf-level">0</span></span>
        <input type="range" id="constant-strong" min="0" value="0" class="constant-slider">
        <span class="constant-effect">÷<span id="sf-effect">1.00</span></span>
      </div>
      <div class="constant-row">
        <span class="constant-label">⚡ 光速 <span id="ls-level">0</span></span>
        <input type="range" id="constant-light" min="0" value="0" class="constant-slider">
        <span class="constant-effect">×<span id="ls-effect">1.00</span></span>
      </div>
      <div class="constant-row">
        <span class="constant-label">🌍 引力 <span id="gv-level">0</span></span>
        <input type="range" id="constant-gravity" min="0" value="0" class="constant-slider">
        <span class="constant-effect">×<span id="gv-effect">1.00</span></span>
      </div>
      <div class="cp-info">
        恒定点: <span id="cp-total">0</span> | 已用: <span id="cp-used">0</span> | 可用: <span id="cp-free">0</span>
      </div>
    </div>
  </div>

  <div id="milestones-bar" class="milestones-bar" style="display:none"></div>

  <script src="js/constants.js?v=4"></script>
  <script src="js/state.js?v=4"></script>
  <script src="js/engine.js?v=4"></script>
  <script src="js/render.js?v=4"></script>
  <script src="js/ui.js?v=4"></script>
  <script src="js/main.js?v=4"></script>
</body>
</html>
